<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Is it Jeremy Renner?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  .app::before {
    content: '';
    position: fixed;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #8B2FC9;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  .header { margin-bottom: 2rem; position: relative; z-index: 1; }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }
  .subtitle {
    font-size: 12px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    position: relative; z-index: 1;
  }
  .tab {
    background: transparent;
    border: 0.5px solid #2a2a2a;
    color: #666;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab i { font-size: 15px; }
  .tab.active { background: #8B2FC9; border-color: #8B2FC9; color: #fff; }
  .tab:hover:not(.active) { border-color: #444; color: #bbb; }

  .panel { display: none; position: relative; z-index: 1; }
  .panel.active { display: block; }

  .url-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .url-row input {
    flex: 1;
    background: #111;
    border: 0.5px solid #2a2a2a;
    color: #f0f0f0;
    border-radius: 7px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.18s;
  }
  .url-row input::placeholder { color: #444; }
  .url-row input:focus { outline: none; border-color: #8B2FC9; }

  .btn-primary {
    background: #8B2FC9;
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.18s, transform 0.1s;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: #a040e8; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: #222; color: #555; cursor: not-allowed; }

  .drop-zone {
    border: 1.5px dashed #2a2a2a;
    border-radius: 10px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
    background: #0e0e0e;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #8B2FC9; background: #130b1f; }
  .drop-zone i { font-size: 36px; color: #3a3a3a; display: block; margin-bottom: 10px; }
  .drop-zone .dz-main { color: #555; font-size: 14px; }
  .drop-zone .dz-hint { color: #333; font-size: 12px; margin-top: 6px; }
  #file-input { display: none; }

  .preview-wrap { margin-top: 14px; text-align: center; }
  .preview-wrap img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    border: 0.5px solid #222;
    object-fit: contain;
  }
  .preview-actions { margin-top: 10px; }

  .cam-wrap {
    background: #0e0e0e;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 4/3;
    max-height: 360px;
    display: flex; align-items: center; justify-content: center;
    border: 0.5px solid #1a1a1a;
  }
  #camera-video { width: 100%; height: 100%; object-fit: cover; display: none; }
  .cam-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #333; text-align: center; padding: 2rem; }
  .cam-placeholder i { font-size: 44px; }
  .cam-placeholder p { font-size: 13px; color: #444; }

  .cam-controls { display: flex; gap: 8px; margin-top: 12px; }
  .btn-secondary {
    flex: 1;
    background: transparent;
    border: 0.5px solid #2a2a2a;
    color: #888;
    padding: 10px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-secondary:hover:not(:disabled) { border-color: #8B2FC9; color: #c07af0; }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary.active { background: #8B2FC9; border-color: #8B2FC9; color: #fff; }

  canvas#snap { display: none; }

  .loading-state {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 1.25rem 1.5rem;
    background: #0e0e0e;
    border-radius: 10px;
    margin-top: 1.5rem;
    border: 0.5px solid #1a1a1a;
  }
  .loading-state.show { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #222;
    border-top-color: #8B2FC9;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { color: #666; font-size: 14px; }

  .error-box {
    display: none;
    background: #120808;
    border: 0.5px solid #3a1818;
    border-radius: 8px;
    padding: 12px 16px;
    color: #c06060;
    font-size: 13px;
    margin-top: 1rem;
  }
  .error-box.show { display: block; }

  .result-box {
    margin-top: 1.5rem;
    background: #0e0e0e;
    border-radius: 10px;
    padding: 1.5rem;
    border: 0.5px solid #1a1a1a;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result-box.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .verdict {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 52px);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .verdict.yes { color: #6ee67a; }
  .verdict.no  { color: #e65959; }
  .verdict.unsure { color: #e6b959; }

  .confidence {
    font-size: 12px;
    color: #555;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .reason {
    font-size: 14px;
    color: #aaa;
    line-height: 1.65;
    border-top: 0.5px solid #1e1e1e;
    padding-top: 12px;
  }

  .footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 11px;
    color: #2a2a2a;
    letter-spacing: 1px;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 class="title">Is it Jeremy Renner?</h1>
    <p class="subtitle">Powered by AI · The only tool that matters</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('upload')">
      <i class="ti ti-upload"></i> Upload / URL
    </button>
    <button class="tab" onclick="switchTab('camera')">
      <i class="ti ti-camera"></i> Live Camera
    </button>
  </div>

  <!-- Upload Panel -->
  <div id="panel-upload" class="panel active">
    <div class="url-row">
      <input type="text" id="img-url" placeholder="Paste an image URL…" onkeydown="if(event.key==='Enter') analyzeFromUrl()" />
      <button class="btn-primary" onclick="analyzeFromUrl()">
        <i class="ti ti-scan"></i> Scan
      </button>
    </div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-photo"></i>
      <p class="dz-main">Drop an image here or click to browse</p>
      <p class="dz-hint">JPG · PNG · GIF · WEBP</p>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" />
    <div class="preview-wrap" id="preview-wrap" style="display:none;">
      <img id="preview-img" src="" alt="Preview" />
      <div class="preview-actions">
        <button class="btn-primary" onclick="analyzePreview()">
          <i class="ti ti-eye-scan"></i> Analyze this image
        </button>
      </div>
    </div>
  </div>

  <!-- Camera Panel -->
  <div id="panel-camera" class="panel">
    <div class="cam-wrap">
      <div class="cam-placeholder" id="cam-placeholder">
        <i class="ti ti-camera-off"></i>
        <p>Start the camera to begin scanning</p>
      </div>
      <video id="camera-video" autoplay playsinline></video>
    </div>
    <canvas id="snap"></canvas>
    <div class="cam-controls">
      <button class="btn-secondary active" id="cam-toggle" onclick="toggleCamera()">
        <i class="ti ti-player-play"></i> Start Camera
      </button>
      <button class="btn-secondary" id="btn-capture" onclick="captureAndAnalyze()" disabled>
        <i class="ti ti-camera"></i> Capture &amp; Scan
      </button>
    </div>
  </div>

  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <p>Consulting the Jeremy Renner Recognition Engine™…</p>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="result-box" id="result-box">
    <div class="verdict" id="verdict"></div>
    <div class="confidence" id="confidence"></div>
    <div class="reason" id="reason"></div>
  </div>

  <p class="footer">NOT AFFILIATED WITH JEREMY RENNER · FOR ENTERTAINMENT PURPOSES</p>
</div>

<script>
  // =========================================================
  // 🔧 PASTE YOUR CLOUDFLARE WORKER URL HERE
  const WORKER_URL = 'https://renner-proxy.jackldearden.workers.dev/';
  // =========================================================

  let cameraStream = null;
  let currentImageData = null;

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) processFile(f);
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0 && tab === 'upload') || (i === 1 && tab === 'camera'))
    );
    document.getElementById('panel-upload').classList.toggle('active', tab === 'upload');
    document.getElementById('panel-camera').classList.toggle('active', tab === 'camera');
    clearState();
  }

  function handleFile(e) {
    const f = e.target.files[0];
    if (f) processFile(f);
  }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      currentImageData = ev.target.result;
      document.getElementById('preview-img').src = currentImageData;
      document.getElementById('preview-wrap').style.display = 'block';
      clearState();
    };
    reader.readAsDataURL(file);
  }

  function buildPromptText() {
    return `You are the world's leading Jeremy Renner identification expert. Look at this image and determine if Jeremy Renner — the actor known for Hawkeye, The Hurt Locker, and Mission: Impossible — is present.

Respond ONLY with a JSON object (no markdown, no backticks) with these exact fields:
- "verdict": one of "YES", "NO", or "UNSURE"
- "confidence": a number 0-100 representing your confidence percentage
- "reason": a 1-2 sentence explanation noting relevant facial features or context clues`;
  }

  function analyzeFromUrl() {
    const url = document.getElementById('img-url').value.trim();
    if (!url) return;
    clearState();
    showLoading();

    // For URLs, fetch the image and convert to base64
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('Could not fetch image');
        return r.blob();
      })
      .then(blob => {
        const reader = new FileReader();
        reader.onload = ev => {
          const base64 = ev.target.result.split(',')[1];
          const mediaType = blob.type || 'image/jpeg';
          callWorker(base64, mediaType);
        };
        reader.readAsDataURL(blob);
      })
      .catch(() => showError('Could not load that image URL. Try downloading the image and uploading it directly.'));
  }

  function analyzePreview() {
    if (!currentImageData) return;
    clearState();
    showLoading();
    const base64 = currentImageData.split(',')[1];
    const mediaType = currentImageData.split(';')[0].split(':')[1];
    callWorker(base64, mediaType);
  }

  async function toggleCamera() {
    const btn = document.getElementById('cam-toggle');
    const video = document.getElementById('camera-video');
    const placeholder = document.getElementById('cam-placeholder');
    const captureBtn = document.getElementById('btn-capture');

    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
      video.style.display = 'none';
      placeholder.style.display = 'flex';
      btn.innerHTML = '<i class="ti ti-player-play"></i> Start Camera';
      btn.classList.add('active');
      captureBtn.disabled = true;
    } else {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = cameraStream;
        video.style.display = 'block';
        placeholder.style.display = 'none';
        btn.innerHTML = '<i class="ti ti-player-pause"></i> Stop Camera';
        btn.classList.remove('active');
        captureBtn.disabled = false;
      } catch (e) {
        showError('Camera access denied or not available on this device.');
      }
    }
  }

  function captureAndAnalyze() {
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('snap');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
    clearState();
    showLoading();
    callWorker(base64, 'image/jpeg');
  }

  function callWorker(base64, mediaType) {
    const body = {
      contents: [{
        parts: [
          {
            inline_data: {
              mime_type: mediaType,
              data: base64
            }
          },
          { text: buildPromptText() }
        ]
      }],
      generationConfig: {
        temperature: 0.1,
        maxOutputTokens: 500
      }
    };

    fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(r => r.json())
    .then(data => {
      hideLoading();
      try {
        const text = data.candidates[0].content.parts[0].text;
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        showResult(parsed);
      } catch (e) {
        showError('Could not parse the result. Please try again.');
      }
    })
    .catch(() => showError('Network error. Make sure the Worker URL is set correctly.'));
  }

  function showResult(r) {
    const labels = { YES: "YES. THAT'S HIM.", NO: "NOPE. NOT RENNER.", UNSURE: "UNCLEAR..." };
    document.getElementById('verdict').textContent = labels[r.verdict] || r.verdict;
    document.getElementById('verdict').className = 'verdict ' + r.verdict.toLowerCase();
    document.getElementById('confidence').textContent = `Confidence: ${Math.round(r.confidence)}%`;
    document.getElementById('reason').textContent = r.reason;
    document.getElementById('result-box').classList.add('show');
  }

  function showLoading() { document.getElementById('loading-state').classList.add('show'); }
  function hideLoading() { document.getElementById('loading-state').classList.remove('show'); }
  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearState() {
    document.getElementById('result-box').classList.remove('show');
    document.getElementById('error-box').classList.remove('show');
    document.getElementById('loading-state').classList.remove('show');
  }
</script>
</body>
</html>
