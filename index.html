<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Is it Him?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,900;1,900&family=Barlow:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: #00aacc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    overflow: hidden;
  }

  /* Jeremy photos on sides */
  .renner-left, .renner-right {
    position: fixed;
    top: 0; bottom: 0;
    width: 18vw;
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    z-index: 0;
    opacity: 0.85;
  }
  .renner-left { left: 0; background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Jeremy_Renner_by_Gage_Skidmore.jpg/440px-Jeremy_Renner_by_Gage_Skidmore.jpg'); }
  .renner-right { right: 0; background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Jeremy_Renner_by_Gage_Skidmore.jpg/440px-Jeremy_Renner_by_Gage_Skidmore.jpg'); transform: scaleX(-1); }

  .main {
    position: relative;
    z-index: 1;
    width: 64vw;
    min-width: 320px;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: 100vh;
    background: #00aacc;
    padding: 0;
  }

  /* Header */
  .header {
    padding: 6px 20px 2px;
    text-align: center;
    flex-shrink: 0;
  }

  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(52px, 9vw, 86px);
    line-height: 0.9;
    color: #003344;
    text-transform: uppercase;
    letter-spacing: -1px;
  }

  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 11px;
    color: #003344;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* Live cam area */
  .cam-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 8px 4px;
    min-height: 0;
  }

  .live-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    color: #003344;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 3px;
    flex-shrink: 0;
  }

  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff2222;
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .cam-wrap {
    flex: 1;
    position: relative;
    background: #003344;
    border-radius: 4px;
    overflow: hidden;
    min-height: 0;
  }

  #camera-video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }

  .cam-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: rgba(0,200,255,0.4);
  }
  .cam-placeholder i { font-size: 48px; }
  .cam-placeholder p {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .cam-placeholder.hidden { display: none; }

  /* Result overlay on cam */
  .cam-result-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,30,50,0.88);
    padding: 12px 16px;
    display: none;
    animation: slideUp 0.25s ease;
  }
  .cam-result-overlay.show { display: block; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }

  .overlay-verdict {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: 36px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 2px;
  }
  .overlay-verdict.yes { color: #44ff88; }
  .overlay-verdict.no { color: #ff4444; }
  .overlay-verdict.unsure { color: #ffcc44; }

  .overlay-confidence {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 4px;
  }

  .overlay-reason {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
  }

  /* Submit button */
  .submit-row {
    padding: 4px 8px 6px;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }

  .btn-submit {
    flex: 1;
    background: #003344;
    border: none;
    color: #00aacc;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: #004a66; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-upload {
    background: rgba(0,51,68,0.5);
    border: 2px solid #003344;
    color: #003344;
    padding: 14px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap;
  }
  .btn-upload:hover { background: rgba(0,51,68,0.25); }

  #file-input { display: none; }

  /* Loading overlay on cam */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(0,30,50,0.7);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(0,200,255,0.2);
    border-top-color: #00aacc;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* Error */
  .error-box {
    display: none;
    margin: 0 12px 8px;
    background: rgba(180,40,40,0.3);
    border: 1.5px solid rgba(255,80,80,0.4);
    border-radius: 4px;
    padding: 10px 14px;
    color: #ffaaaa;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .error-box.show { display: block; }

  canvas#snap { display: none; }
</style>
</head>
<body>

<div class="renner-left"></div>
<div class="renner-right"></div>

<div class="main">
  <div class="header">
    <h1 class="title">Is it Him?</h1>
    <p class="subtitle">Presented by Jeremy Renner App Too</p>
  </div>

  <div class="cam-section">
    <div class="live-label">
      <div class="live-dot"></div>
      Live Cam
    </div>
    <div class="cam-wrap">
      <div class="cam-placeholder" id="cam-placeholder">
        <i class="ti ti-camera-off"></i>
        <p>Starting camera…</p>
      </div>
      <video id="camera-video" autoplay playsinline></video>
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>Analyzing…</p>
      </div>
      <div class="cam-result-overlay" id="cam-result-overlay">
        <div class="overlay-verdict" id="overlay-verdict"></div>
        <div class="overlay-confidence" id="overlay-confidence"></div>
        <div class="overlay-reason" id="overlay-reason"></div>
      </div>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="submit-row">
    <button class="btn-submit" id="btn-submit" onclick="captureAndAnalyze()">
      <i class="ti ti-camera"></i> Submit Photo
    </button>
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-upload"></i> Upload
    </button>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" />
  </div>
</div>

<canvas id="snap"></canvas>

<script>
  const WORKER_URL = 'https://renner-proxy.jackldearden.workers.dev';
  let cameraStream = null;

  // Auto-start camera on load
  window.addEventListener('load', () => { startCamera(); });

  async function startCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
      const video = document.getElementById('camera-video');
      video.srcObject = cameraStream;
      document.getElementById('cam-placeholder').classList.add('hidden');
    } catch(e) {
      document.getElementById('cam-placeholder').querySelector('p').textContent = 'Camera unavailable';
    }
  }

  function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const base64 = ev.target.result.split(',')[1];
      const mediaType = ev.target.result.split(';')[0].split(':')[1];
      clearResult();
      showLoading();
      callWorker(base64, mediaType);
    };
    reader.readAsDataURL(f);
  }

  function captureAndAnalyze() {
    const video = document.getElementById('camera-video');
    if (!cameraStream || !video.videoWidth) {
      showError('Camera not ready. Please allow camera access and try again.');
      return;
    }
    const canvas = document.getElementById('snap');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
    clearResult();
    showLoading();
    callWorker(base64, 'image/jpeg');
  }

  function buildPrompt() {
    return 'You are the world\'s leading Jeremy Renner identification expert. Look at this image and determine if Jeremy Renner — the actor known for Hawkeye, The Hurt Locker, and Mission: Impossible — is present.\n\nRespond ONLY with a JSON object (no markdown, no backticks) with these exact fields:\n- "verdict": one of "YES", "NO", or "UNSURE"\n- "confidence": a number 0-100\n- "reason": a 1-2 sentence explanation';
  }

  function callWorker(base64, mediaType) {
    fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 500,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: buildPrompt() }
        ]}]
      })
    })
    .then(r => r.json())
    .then(data => {
      hideLoading();
      try {
        if (data.error) { showError('API error: ' + (data.error.message || JSON.stringify(data.error))); return; }
        const text = data.content.map(c => c.text || '').join('');
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('no json');
        const parsed = JSON.parse(jsonMatch[0]);
        showResult(parsed);
      } catch(e) { showError('Could not parse result. Try again.'); }
    })
    .catch(() => showError('Network error. Please try again.'));
  }

  function showResult(r) {
    const labels = { YES: "Yes. That's him.", NO: "Nope. Not Renner.", UNSURE: "Unclear..." };
    document.getElementById('overlay-verdict').textContent = labels[r.verdict] || r.verdict;
    document.getElementById('overlay-verdict').className = 'overlay-verdict ' + r.verdict.toLowerCase();
    document.getElementById('overlay-confidence').textContent = 'Confidence: ' + Math.round(r.confidence) + '%';
    document.getElementById('overlay-reason').textContent = r.reason;
    document.getElementById('cam-result-overlay').classList.add('show');
  }

  function showLoading() { document.getElementById('loading-overlay').classList.add('show'); }
  function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }
  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearResult() {
    document.getElementById('cam-result-overlay').classList.remove('show');
    document.getElementById('error-box').classList.remove('show');
  }
</script>
</body>
</html>
